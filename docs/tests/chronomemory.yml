# specsmith test cases — chronomemory
# CANONICAL SOURCE: edit this file, not docs/TESTS.md
# Namespace: TEST-CM-NNN

- id: TEST-CM-001
  title: WAL SHA-256 chain is valid after N appends
  requirement_id: REQ-CM-001
  type: unit
  file: tests/test_wal_chain.py
  function: test_wal_hash_chain_integrity
  description: >
    Append 10 records to a fresh store. Assert chain_valid() == True.
    Directly mutate one record's payload in-memory. Assert chain_valid() == False.
    Reopen store from disk (chain on disk is intact). Assert chain_valid() == True.

- id: TEST-CM-002
  title: WAL file is valid NDJSON
  requirement_id: REQ-CM-002
  type: unit
  file: tests/test_wal_chain.py
  function: test_wal_is_ndjson
  description: >
    After upsert(), read events.wal. Assert every non-empty line parses as
    json.loads() without error. Assert no binary magic bytes at file start.

- id: TEST-CM-003
  title: ChronoRecord carries all 7 OEA fields
  requirement_id: REQ-CM-003
  type: unit
  file: tests/test_oea.py
  function: test_all_oea_fields_present
  description: >
    Create a ChronoRecord with only id and label. Assert to_dict() contains
    all 7 OEA fields: source_type, confidence, evidence, epistemic_boundary,
    is_hypothesis, model_assumptions, recursion_depth. Assert all fields survive
    upsert() + round-trip via WAL replay.

- id: TEST-CM-004
  title: Snapshot + WAL tail replay produces correct state
  requirement_id: REQ-CM-004
  type: unit
  file: tests/test_store.py
  function: test_snapshot_replay_consistency
  description: >
    Write 55 records (triggers snapshot at 50). Close store. Reopen. Assert all
    55 records are present and correct. Assert reopened store.wal_seq() == 55.

- id: TEST-CM-005
  title: query(rag_filter=True) applies H18 confidence threshold
  requirement_id: REQ-CM-005
  type: unit
  file: tests/test_query.py
  function: test_rag_filter_confidence_threshold
  description: >
    Insert records at confidence 0.9, 0.6, 0.5, 0.0. query(rag_filter=True)
    must return exactly those with confidence >= 0.6 and status == "active".
    A tombstoned record at confidence 0.9 must not be returned.

- id: TEST-CM-006
  title: delete() tombstones record without physical removal
  requirement_id: REQ-CM-006
  type: unit
  file: tests/test_store.py
  function: test_tombstone_no_physical_removal
  description: >
    Upsert a record. Call delete(record_id). Assert get(record_id) still returns
    the record (not None). Assert record.status == "tombstone". Assert events.wal
    contains both the original upsert and the delete event (WAL line count >= 2).
    Assert query(status="active") does not include the tombstoned record.

- id: TEST-CM-007
  title: WAL write is atomic — no partial write on simulated crash
  requirement_id: REQ-CM-007
  type: unit
  file: tests/test_wal_chain.py
  function: test_atomic_wal_write
  description: >
    Mock os.replace to raise OSError after the tmp write. Assert the original
    events.wal is unchanged (fallback path may write directly). Assert
    chain_valid() returns True on the resulting file.

- id: TEST-CM-008
  title: migrate_from_json() is idempotent
  requirement_id: REQ-CM-008
  type: unit
  file: tests/test_store.py
  function: test_migrate_from_json_idempotent
  description: >
    Create a fake .specsmith/ dir with requirements.json and testcases.json.
    Run migrate_from_json() twice. Assert record count equals the number of
    unique IDs (no duplicates). Assert all records have source_type="observed".
    Assert governance status "implemented" maps to ESDB status "active".

- id: TEST-CM-009
  title: chronomemory imports without any external package installed
  requirement_id: REQ-CM-009
  type: unit
  file: tests/test_store.py
  function: test_zero_external_deps
  description: >
    Import chronomemory in a subprocess with PYTHONPATH restricted to stdlib +
    the chronomemory package itself. Assert no ImportError is raised. Assert
    ChronoStore, ChronoRecord, WalEvent, EsdbBridge are all importable.

- id: TEST-CM-010
  title: WAL written by one project is readable by another
  requirement_id: REQ-CM-010
  type: integration
  file: tests/test_wal_chain.py
  function: test_cross_project_wal_compatibility
  description: >
    Write a WAL in one temp dir using ChronoStore. Copy events.wal to a second
    temp dir. Open a new ChronoStore on the second dir. Assert all records are
    present. Assert chain_valid() == True on the second store.

- id: TEST-CM-011
  title: WAL with CRLF line endings parses correctly on all platforms
  requirement_id: REQ-CM-011
  type: integration
  file: tests/test_robustness.py
  function: TestWalCorruption::test_wal_crlf_line_endings
  description: >
    Write 3 records. Convert WAL to CRLF line endings. Reopen store.
    Assert record_count() == 3. This validates cross-platform read compatibility.
    CI matrix covers ubuntu-latest and windows-latest on Python 3.10–3.13.

- id: TEST-CM-012
  title: Graceful recovery from WAL and snapshot corruption
  requirement_id: REQ-CM-012
  type: unit
  file: tests/test_robustness.py
  function: TestWalCorruption
  description: >
    12 corruption scenarios tested: partial last line, truncated at boundary,
    tampered hash, wrong prev_hash, garbage line, binary bytes, missing hash
    field, wrong seq type, empty WAL, whitespace-only WAL, null bytes in value,
    CRLF endings. All must not raise exceptions.
    5 snapshot corruption scenarios: truncated JSON, seq higher than WAL,
    invalid record inside, empty records array, missing snapshot file.

- id: TEST-CM-013
  title: Snapshot triggers at seq=50 and tail-replay fills remainder
  requirement_id: REQ-CM-013
  type: unit
  file: tests/test_robustness.py
  function: TestBoundaryConditions::test_exactly_51_records_snapshot_plus_tail
  description: >
    Write 51 records. Assert snapshot.json exists and contains seq==50.
    Assert record_count() == 51. Assert wal_seq() == 51. Validates that the
    snapshot+tail architecture works correctly at the snapshot boundary.

- id: TEST-CM-014
  title: EsdbBridge delegates to ChronoStore WAL; falls back to JSON
  requirement_id: REQ-CM-014
  type: unit
  file: tests/test_bridge.py
  function: TestEsdbBridgeStatus
  description: >-
    With WAL: status().backend contains 'ChronoStore'. requirements() and
    testcases() return records from the WAL. upsert_record() returns True.
    Without WAL: status().backend contains 'json'. requirements() returns
    records from .specsmith/requirements.json. upsert_record() returns False.

# ---------------------------------------------------------------------------
# Phase 2 tests (TEST-CM-015..021)
# ---------------------------------------------------------------------------

- id: TEST-CM-015
  title: DepGraph edge operations and WAL persistence
  requirement_id: REQ-CM-015
  type: unit
  file: tests/test_deps.py
  function: multiple
  description: >-
    12 tests covering: EDGE_TYPES frozenset has all 9 types; DepGraph starts
    empty; add_edge stores in memory; invalid edge type raises ValueError;
    remove_edge deletes (no-op for missing); multiple edges stored; what_depends_on
    returns correct predecessors; what_contradicts is bidirectional; what_assumes
    returns outgoing; transitive_successors follows chains; transitive_successors
    guards circular deps; add_edge with store persists kind=edge WAL record;
    from_store reloads edges after close+reopen; chain_valid() True after edges.

- id: TEST-CM-016
  title: Epistemic rollback cascade and WAL coverage
  requirement_id: REQ-CM-016
  type: unit
  file: tests/test_rollback.py
  function: multiple
  description: >-
    10 tests covering: invalidate sets target status=invalidated; missing
    record returns report with no direct_change; cascade 1-level (depends_on);
    cascade 2-level (derived_from chain); confidence halved on cascade;
    affected_ids includes target + all cascaded; circular dependency terminates;
    rollback_event WAL record written; chain_valid True after rollback;
    ChronoStore.invalidate() convenience method delegates correctly.

- id: TEST-CM-017
  title: ContextPackCompiler compile, exclusions, and budget enforcement
  requirement_id: REQ-CM-017
  type: unit
  file: tests/test_context_pack.py
  function: multiple
  description: >-
    8 tests covering: compile() returns ContextPack instance with correct
    task_id/goal; includes relevant records matching goal keywords; excludes
    tombstoned records; excludes invalidated records; excludes low-confidence
    (< 0.6) records; token_count never exceeds token_budget; entries sorted
    by confidence desc; to_dict() produces JSON-serializable output with
    entries and excluded keys.

- id: TEST-CM-018
  title: Extended query API - all 18 s23 functions
  requirement_id: REQ-CM-018
  type: unit
  file: tests/test_query_ext.py
  function: multiple
  description: >-
    28 tests covering all 18 query functions with >= 2 tests each: what_is_known
    (confidence filter, kind filter); what_conflicts_with (with/without graph);
    what_depends_on (with/without graph); what_changed_since (seq=0, high seq);
    what_requires_reverification (hypothesis filter); has_this_work_been_done
    (true/false); why_do_we_believe (chain, missing); what_context_packs_are_stale
    (stale/clean pack); what_world_models_conflict (with/without graph);
    what_assumptions_underlie (with/without graph); what_generated_artifacts_depend_on
    (with/without graph); what_confidence_collapsed (low-hyp, active excluded);
    what_can_agent_do_next (unblocked, no graph); what_should_agent_not_do
    (stop_condition, empty store); what_skills_apply (match, no match);
    what_state_delta_would_complete (with/without graph); is_this_action_duplicate
    (true/false); what_context_pack_minimizes_tokens (list, no invalid).

- id: TEST-CM-019
  title: Token metrics CRUD and efficiency report
  requirement_id: REQ-CM-019
  type: unit
  file: tests/test_metrics.py
  function: multiple
  description: >-
    5 token-metrics tests: record_token_metric writes kind=token_metric WAL
    record with correct task_id and total_tokens; get_token_metrics filters by
    task_id; token_efficiency_report returns zeros for empty store; efficiency
    report calculates tokens_per_success, avg_tool_calls, duplicate_block_rate
    correctly across mixed success/failure tasks; ChronoStore.record_token_metric
    convenience method works end-to-end.

- id: TEST-CM-020
  title: Skill system find and run
  requirement_id: REQ-CM-020
  type: unit
  file: tests/test_metrics.py
  function: multiple
  description: >-
    5 skill-system tests: find_skills matches by activation keyword intersection;
    find_skills returns [] on no match; record_skill_run writes kind=skill_run
    WAL record with correct skill_id and success=True at confidence=1.0; failed
    skill run writes confidence=0.5; ChronoStore.find_skills convenience method
    works; chain_valid() True after token metrics + skill runs.

- id: TEST-CM-022
  title: DepGraph WAL persistence and replay after reopen
  requirement_id: REQ-CM-022
  type: integration
  file: tests/test_deps.py
  function: test_add_edge_persists_to_wal; test_from_store_reloads_edges; test_chain_valid_covers_edge_events
  description: >-
    Three integration tests: (1) add_edge with a store persists a kind=edge
    ChronoRecord to the WAL with correct from_id, to_id, edge_type fields;
    (2) after close+reopen, DepGraph.from_store() reconstructs all edges;
    (3) chain_valid() returns True after adding edges, confirming edge records
    go through the normal WAL upsert chain without special handling.

- id: TEST-CM-023
  title: Rollback WAL event and ChronoStore.invalidate delegation
  requirement_id: REQ-CM-023
  type: unit
  file: tests/test_rollback.py
  function: test_rollback_event_written_to_wal; test_chain_valid_after_rollback; test_store_invalidate_method
  description: >-
    Three tests: (1) invalidate() writes a kind=rollback_event WAL record with
    correct target_id in data; (2) chain_valid() remains True after rollback
    operations confirming rollback events integrate with the WAL chain;
    (3) ChronoStore.invalidate(record_id, reason, dep_graph) delegates to
    rollback.invalidate() and returns a RollbackReport instance.

- id: TEST-CM-024
  title: record_skill_run WAL record and confidence values
  requirement_id: REQ-CM-024
  type: unit
  file: tests/test_metrics.py
  function: test_record_skill_run_writes_wal_record; test_record_skill_run_failure_lowers_confidence; test_store_find_skills_method
  description: >-
    Three tests: (1) record_skill_run writes a kind=skill_run WAL record with
    correct skill_id, success=True, and confidence=1.0; (2) a failed skill run
    writes confidence=0.5; (3) ChronoStore.record_skill_run convenience method
    delegates correctly and chain_valid() remains True after both runs.

- id: TEST-CM-021
  title: ChronoStore Phase 2 convenience methods
  requirement_id: REQ-CM-021
  type: unit
  file: tests/test_metrics.py
  function: multiple
  description: >-
    Covered by test_rollback.py::test_store_invalidate_method,
    test_metrics.py::test_record_token_metric_store_method,
    test_metrics.py::test_store_find_skills_method, and
    test_metrics.py::test_chain_valid_after_metrics. All six ChronoStore Phase 2
    convenience methods (invalidate, record_token_metric, get_token_metrics,
    token_efficiency_report, find_skills, record_skill_run) must delegate
    correctly to their module functions and produce identical results.
