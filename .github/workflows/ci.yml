name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Default: deny all; each job grants only what it needs.
permissions: {}

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (no extras — verify zero-dep install)
        run: pip install -e .

      - name: Install dev dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=chronomemory --cov-report=term-missing --cov-fail-under=85

  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: ruff format --check
        run: ruff format --check src/ tests/
      - name: ruff check
        run: ruff check src/ tests/
      - name: mypy
        run: mypy src/chronomemory/

  rust-lint:
    name: Rust lint (clippy + fmt)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: cargo fmt --check
        run: cargo fmt --check --all
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  security:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --workspace

  zero-deps:
    name: Verify zero runtime dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install only the package (no extras)
        run: pip install --no-deps -e .
      - name: Check pip show lists no runtime deps
        run: |
          python -c "
          import importlib.metadata
          dist = importlib.metadata.distribution('chronomemory')
          all_reqs = dist.metadata.get_all('Requires-Dist') or []
          requires = [r for r in all_reqs if '; extra ==' not in r]
          assert len(requires) == 0, f'Unexpected runtime deps: {requires}'
          print('Zero runtime dependencies confirmed.')
          "
      - name: Import smoke test
        run: python -c "from chronomemory import ChronoStore, ChronoRecord, EsdbBridge; print('OK')"
